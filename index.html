<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍕 Comanda Pizzes — Club Bàsquet Roser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #f0f0f0; min-height: 100vh; }
  header { background: #e63946; padding: 28px 20px; text-align: center; }
  header h1 { font-size: 2em; font-weight: 800; letter-spacing: -1px; }
  header p { margin-top: 6px; opacity: 0.9; font-size: 1em; }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 80px; }
  .field-block { background: #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .field-block label { display: block; font-weight: 600; margin-bottom: 10px; color: #e63946; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; }
  input[type="text"], input[type="number"], textarea {
    width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444;
    border-radius: 8px; color: #f0f0f0; font-size: 1em; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 80px; }
  input:focus, textarea:focus { outline: none; border-color: #e63946; }
  .section-title {
    font-size: 0.75em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: #888; margin: 28px 0 12px;
    border-left: 3px solid #e63946; padding-left: 10px;
  }
  .pizza-grid { display: flex; flex-direction: column; gap: 8px; }
  .pizza-item {
    display: flex; align-items: center; gap: 14px;
    background: #2a2a2a; border-radius: 10px; padding: 14px 16px;
    cursor: pointer; transition: background 0.15s;
    border: 2px solid transparent;
  }
  .pizza-item:hover { background: #333; }
  .pizza-item.checked { background: #1f2f1f; border-color: #4caf50; }
  .pizza-item input[type="checkbox"] { display: none; }
  .checkmark {
    width: 22px; height: 22px; border-radius: 6px; border: 2px solid #555;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .pizza-item.checked .checkmark { background: #4caf50; border-color: #4caf50; }
  .checkmark::after { content: '✓'; color: white; font-size: 14px; display: none; }
  .pizza-item.checked .checkmark::after { display: block; }
  .pizza-info { flex: 1; }
  .pizza-name { font-weight: 600; font-size: 0.98em; }
  .pizza-desc { font-size: 0.78em; color: #999; margin-top: 2px; line-height: 1.4; }
  .pizza-price { font-weight: 700; color: #e63946; font-size: 0.95em; white-space: nowrap; }
  .summary-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #111; border-top: 1px solid #333;
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .summary-bar span { font-size: 0.9em; color: #aaa; }
  .summary-bar strong { color: #f0f0f0; }
  button.submit {
    background: #e63946; color: white; border: none; border-radius: 8px;
    padding: 12px 24px; font-size: 1em; font-weight: 700; cursor: pointer;
  }
  button.submit:disabled { background: #555; cursor: default; }
  .success {
    display: none; text-align: center; padding: 40px 20px;
    background: #1f2f1f; border-radius: 12px; margin-top: 20px;
  }
  .success h2 { color: #4caf50; font-size: 1.5em; margin-bottom: 10px; }
  .success p { color: #aaa; }
  .results-toggle { text-align: center; margin: 30px 0 10px; }
  .results-toggle button {
    background: transparent; border: 1px solid #444; color: #aaa;
    padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85em;
  }
  #results-panel { display: none; background: #2a2a2a; border-radius: 12px; padding: 20px; }
  #results-panel h3 { margin-bottom: 16px; color: #e63946; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
  .result-row:last-child { border-bottom: none; }
  .bar { height: 6px; background: #e63946; border-radius: 3px; margin-top: 4px; }
  .spinner { display: none; text-align: center; padding: 20px; color: #aaa; }
</style>
</head>
<body>

<header>
  <h1>🍕 Comanda de Pizzes</h1>
  <p>Club de Bàsquet Roser</p>
</header>

<div class="container">
  <div class="field-block">
    <label>El teu nom *</label>
    <input type="text" id="nom" placeholder="Ex: Marc García">
  </div>
  <div class="field-block">
    <label>Nombre de persones que mengeu *</label>
    <input type="number" id="persones" min="1" max="20" placeholder="Ex: 4">
  </div>

  <div class="section-title">Clàssiques</div>
  <div class="pizza-grid" id="grid-classiques"></div>

  <div class="section-title">Especials</div>
  <div class="pizza-grid" id="grid-especials"></div>

  <div class="section-title">Premium</div>
  <div class="pizza-grid" id="grid-premium"></div>

  <div class="section-title">Del Mar</div>
  <div class="pizza-grid" id="grid-mar"></div>

  <div class="section-title">Dolça</div>
  <div class="pizza-grid" id="grid-dolca"></div>

  <div class="field-block" style="margin-top:28px">
    <label>💬 Comentaris / Al·lèrgies / Modificacions</label>
    <textarea id="comentaris" placeholder="Ex: Calzone sense champiñones, al·lèrgia als fruits secs..."></textarea>
  </div>

  <div class="success" id="success-msg">
    <h2>✅ Gràcies!</h2>
    <p>La teva comanda s'ha registrat correctament.<br>Ens veiem a la pizza! 🍕</p>
  </div>

  <div class="results-toggle">
    <a href="https://docs.google.com/spreadsheets/d/1xu5BAnMLzZvrEUi8xg1F6bnyuLASqbR2cWbXPFnFsI0/edit?usp=sharing" target="_blank">
      <button style="background:transparent;border:1px solid #444;color:#aaa;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:0.85em;">📊 Veure resultats actuals</button>
    </a>
  </div>
</div>

<div class="summary-bar">
  <span>Seleccionades: <strong id="count">0</strong></span>
  <button class="submit" id="btn-enviar" onclick="enviar()" disabled>Enviar comanda</button>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwQ8tl3mVgZrDGW2N15W5YipzAVaFHPOkD3K0qGbD85G6G3t599KPGWBIAFn97DK0GPsg/exec';

const pizzes = {
  classiques: [
    { nom: "Margherita", desc: "Tomate, mozzarella, albahaca", preu: "11.00€" },
    { nom: "Prosciuto", desc: "Tomate, mozzarella, jamón dulce", preu: "11.60€" },
    { nom: "Pizza bacon", desc: "Tomate, mozzarella, bacón", preu: "11.60€" },
    { nom: "Pizza funghi", desc: "Tomate, mozzarella, champiñones", preu: "11.60€" },
    { nom: "Pizza bufala", desc: "Tomate, mozzarella de bufala, pesto de tomate, albahaca", preu: "11.60€" },
    { nom: "Capricciosa", desc: "Tomate, mozzarella, jamón dulce, champiñones", preu: "12.30€" },
    { nom: "Hawaiana", desc: "Tomate, mozzarella, jamón dulce, piña", preu: "12.30€" },
    { nom: "Napoletana", desc: "Tomate, mozzarella, anchoas, alcaparras", preu: "12.30€" },
    { nom: "Calzone", desc: "Cerrada: tomate, mozzarella, jamón, champiñones, ricotta", preu: "12.30€" },
    { nom: "Carbonara", desc: "Tomate, mozzarella, bacón, champiñones, huevo", preu: "12.80€" },
    { nom: "4 Stagioni", desc: "Tomate, mozzarella, jamón, champiñones, olivas, alcachofas", preu: "12.80€" },
  ],
  especials: [
    { nom: "Pastor", desc: "Tomate, mozzarella, bacón, queso de cabra", preu: "12.80€" },
    { nom: "Tonnata", desc: "Tomate, mozzarella, atún, cebolla", preu: "12.80€" },
    { nom: "Vegetal", desc: "Tomate, mozzarella, berenjena frita, setas, cebolla, tomate, pimiento", preu: "13.30€" },
    { nom: "Diavola", desc: "Tomate, mozzarella, chorizo picante, tomate cherry, guindillas 🌶️", preu: "13.30€" },
    { nom: "Du-Chef", desc: "Tomate, mozzarella, carne picada, champiñones, cebolla", preu: "13.70€" },
    { nom: "Rayos de sol", desc: "Tomate, mozzarella, bacón, huevo, espárragos", preu: "13.70€" },
    { nom: "Pollastre", desc: "Tomate, mozzarella, pollo, maíz", preu: "13.70€" },
    { nom: "Pizza mexicana", desc: "Tomate, mozzarella, carne picada, jalapeño, salsa mexicana 🌶️", preu: "14.00€" },
    { nom: "Pizza Barbacoa", desc: "Salsa barbacoa, mozzarella, bacón, carne picada, cebolla", preu: "14.00€" },
    { nom: "Bolets", desc: "Tomate, mozzarella, girgola, champiñones, porcini", preu: "14.00€" },
    { nom: "Kebab pizza", desc: "Tomate, mozzarella, kebab, cebolla, guindillas al vinagre", preu: "14.00€" },
  ],
  premium: [
    { nom: "4 Quesos", desc: "Sin tomate, mozzarella, roquefort, parmesano, edam", preu: "13.70€" },
    { nom: "Pizza Muñoz", desc: "Sin tomate, mozzarella, jamón serrano, cherry, parmesano, rúcula", preu: "14.00€" },
    { nom: "Pizza Solomillo", desc: "Tomate, mozzarella, solomillo de cerdo, queso feta, pimiento verde", preu: "14.00€" },
    { nom: "Pizza pujades", desc: "Sin tomate, mozzarella, paleta ibérica, pesto tomate, piñones", preu: "15.80€" },
  ],
  mar: [
    { nom: "Pizza del mar", desc: "Tomate, mozzarella, mejillones, gambas, calamares", preu: "15.80€" },
  ],
  dolca: [
    { nom: "Pizza nutella", desc: "Nueces, crema nutella 🍫", preu: "10.00€" },
  ]
};

function buildGrid(seccio, gridId) {
  const grid = document.getElementById(gridId);
  pizzes[seccio].forEach((p, i) => {
    const id = `${seccio}-${i}`;
    const div = document.createElement('div');
    div.className = 'pizza-item';
    div.dataset.id = id;
    div.innerHTML = `
      <input type="checkbox" id="${id}">
      <div class="checkmark"></div>
      <div class="pizza-info">
        <div class="pizza-name">${p.nom}</div>
        <div class="pizza-desc">${p.desc}</div>
      </div>
      <div class="pizza-price">${p.preu}</div>`;
    div.onclick = () => togglePizza(div, id);
    grid.appendChild(div);
  });
}

function togglePizza(div, id) {
  const cb = document.getElementById(id);
  cb.checked = !cb.checked;
  div.classList.toggle('checked', cb.checked);
  updateCount();
}

function updateCount() {
  const n = document.querySelectorAll('.pizza-item.checked').length;
  document.getElementById('count').textContent = n;
  const nom = document.getElementById('nom').value.trim();
  const persones = document.getElementById('persones').value.trim();
  document.getElementById('btn-enviar').disabled = n === 0 || !nom || !persones;
}

document.getElementById('nom').addEventListener('input', updateCount);
document.getElementById('persones').addEventListener('input', updateCount);

async function enviar() {
  const nom = document.getElementById('nom').value.trim();
  const persones = document.getElementById('persones').value.trim();
  const comentaris = document.getElementById('comentaris').value.trim();
  if (!nom || !persones) { alert('Si us plau, omple el nom i el nombre de persones.'); return; }

  const seleccionades = [];
  document.querySelectorAll('.pizza-item.checked').forEach(div => {
    const [seccio, idx] = div.dataset.id.split('-');
    seleccionades.push(pizzes[seccio][parseInt(idx)].nom);
  });

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = 'Enviant...';

  try {
    const params = new URLSearchParams({
      action: 'vote',
      nom: nom,
      persones: persones,
      pizzes: seleccionades.join('|'),
      comentaris: comentaris,
      timestamp: new Date().toISOString()
    });
    await fetch(APPS_SCRIPT_URL + '?' + params.toString(), {
      method: 'GET',
      mode: 'no-cors'
    });
  } catch(e) { console.warn('fetch error (no-cors normal)', e); }

  // Build success message
  const successEl = document.getElementById('success-msg');
  let html = `<h2>✅ Gràcies, ${nom}!</h2>`;
  html += `<p style="margin-top:12px;color:#ccc">🍕 <strong>${seleccionades.join(', ')}</strong></p>`;
  if (comentaris) html += `<p style="margin-top:8px;color:#aaa;font-style:italic">💬 ${comentaris}</p>`;
  html += `<p style="margin-top:12px;color:#888;font-size:0.85em">La teva comanda s'ha registrat correctament.</p>`;
  successEl.innerHTML = html;
  successEl.style.display = 'block';
  successEl.scrollIntoView({ behavior: 'smooth' });
  btn.textContent = 'Enviat ✓';
  document.querySelectorAll('.pizza-item.checked').forEach(d => {
    d.classList.remove('checked');
    document.getElementById(d.dataset.id).checked = false;
  });
  document.getElementById('count').textContent = 0;
  document.getElementById('nom').value = '';
  document.getElementById('persones').value = '';
  document.getElementById('comentaris').value = '';
}


buildGrid('classiques', 'grid-classiques');
buildGrid('especials', 'grid-especials');
buildGrid('premium', 'grid-premium');
buildGrid('mar', 'grid-mar');
buildGrid('dolca', 'grid-dolca');
</script>
</body>
</html>
